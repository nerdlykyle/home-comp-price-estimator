    <g>
      <rect x="555" y="80" width="175" height="90" rx="11" fill="#16242F" stroke="#2C5A6E"/>
      <circle cx="580" cy="105" r="13" fill="#5CC6E8"/><text x="580" y="110" text-anchor="middle" fill="#0E1822" font-weight="700" font-size="14">4</text>
      <text x="605" y="110" fill="#5CC6E8" font-size="14" font-weight="600">Read estimate</text>
      <text x="573" y="140" fill="#8FA3B0" font-size="12">Range + "if it</text>
