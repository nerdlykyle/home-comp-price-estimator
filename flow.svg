    <g fill="#5CC6E8">
      <path d="M183 125 l16 0 m-6 -5 l6 5 -6 5" stroke="#5CC6E8" stroke-width="2" fill="none"/>
      <path d="M358 125 l16 0 m-6 -5 l6 5 -6 5" stroke="#5CC6E8" stroke-width="2" fill="none"/>
      <path d="M533 125 l16 0 m-6 -5 l6 5 -6 5" stroke="#5CC6E8" stroke-width="2" fill="none"/>
